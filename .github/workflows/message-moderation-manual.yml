name: Message Moderation Manual

on:
  workflow_dispatch:

  # Para activarlo a futuro, descomentar esta sección.
  # schedule:
  #   - cron: "*/5 * * * *"

jobs:
  moderate-messages:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger moderation endpoint
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_BASE_URL" ]; then
            echo "Missing APP_BASE_URL secret"
            exit 1
          fi

          if [ -z "$CRON_SECRET" ]; then
            echo "Missing CRON_SECRET secret"
            exit 1
          fi

          curl --fail --show-error --silent \
            -X POST "${APP_BASE_URL}/api/messages/moderate-cron" \
            -H "Authorization: Bearer ${CRON_SECRET}"

